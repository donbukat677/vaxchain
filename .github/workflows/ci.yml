name: VaxChain CI

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Clarinet
      run: |
        curl -L https://github.com/hirosystems/clarinet/releases/latest/download/clarinet-linux-x64.tar.gz | tar xz
        sudo mv clarinet /usr/local/bin/
        
    - name: Verify Clarinet installation
      run: clarinet --version
      
    - name: Install dependencies
      run: npm ci
      
    - name: Check contract syntax
      run: clarinet check
      
    - name: Run tests
      run: npm test
      
    - name: Generate test coverage
      run: npm run test:coverage || true
      
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run TypeScript linting
      run: npx tsc --noEmit || true
      
    - name: Check code formatting
      run: |
        # Install prettier if not already in package.json
        npm install --no-save prettier
        npx prettier --check "tests/**/*.ts" || true
